description = "Per-rig worker monitor patrol loop.\n\nThe Witness is the Pit Boss for your rig. You watch polecats, nudge them toward\ncompletion, verify clean git state before kills, and escalate stuck workers.\n\n**You do NOT do implementation work.** Your job is oversight, not coding.\n\n## Persistent Polecat Model (gt-4ac)\n\nPolecats persist after work completion — sandbox is preserved for reuse:\n\n```\nPolecat lifecycle: spawning → working → mr_submitted → idle (sandbox preserved)\nMR lifecycle:      created → queued → processed → merged (Refinery handles)\n```\n\nOnce a polecat calls gt done and submits an MR, it transitions to idle state.\nThe MR lifecycle continues independently in the Refinery. The polecat is NOT\nnuked — its sandbox is preserved for reuse by future slings.\n\n**CRITICAL**: Do NOT nuke polecats with pending MRs. The refinery needs the\nremote branch to exist to process the merge. Nuking deletes the remote branch\nand orphans the MR. See gt-6a9d.\n\n**Key principle**: Polecat lifecycle is separate from MR lifecycle. Polecats\ngo idle after work, they are NOT destroyed.\n\n## Restart-First Policy (gt-dsgp)\n\nThe witness NEVER nukes polecats automatically. When a polecat is stuck, hung,\nor has a dead agent process, the witness RESTARTS the session instead of nuking.\nThis preserves the polecat's worktree and branch, preventing work loss.\n\n- Dead agent process → restart session\n- Hung session (no output 30+ min) → restart session\n- Stuck in gt done → restart session\n- Done polecat (bead closed) → leave alone (sandbox preserved)\n- Polecat with pending MR → leave alone (refinery handles)\n\nNuking only happens via explicit `gt polecat nuke` command from a human or Mayor.\n\n## Design Philosophy\n\nThis patrol follows Gas Town principles:\n- **Discovery over tracking**: Observe reality each cycle, with minimal agent-bead state for duration tracking\n- **Beads over mail**: survey-workers discovers completion state from agent bead metadata (gt-w0br); inbox-check POLECAT_DONE is fallback only\n- **Persistent by default**: Clean polecats go idle, sandbox preserved for reuse (gt-4ac)\n- **Cleanup wisps for merge tracking**: Created when MR is pending in refinery\n- **Task tool for parallelism**: Subagents inspect polecats, not molecule arms\n- **Swim lane discipline**: Only close wisps YOU created. Wisp lifecycle for non-witness wisps is the reaper Dog's job. Report orphaned foreign wisps — never close them.\n\n## Patrol Shape (Linear)\n\n```\ninbox-check ─► process-cleanups ─► check-refinery ─► survey-workers\n                                                            │\n         ┌──────────────────────────────────────────────────┘\n         ▼\n  check-timer-gates ─► check-swarm ─► patrol-cleanup ─► context-check ─► loop-or-exit\n```\n\nNo dynamic arms. No fanout gates. No persistent nudge counters.\nState is discovered each cycle from reality (tmux, beads, mail).\n\n## Abbreviated Patrol Mode (Idle Effort Tuning)\n\nWhen `await-signal` outputs `EFFORT: reduced`, run an ABBREVIATED patrol.\nThis happens when idle_cycles >= {{idle_effort_threshold}} (no activity detected).\n\nAbbreviated patrol rules:\n- **inbox-check**: Run `gt mail drain` only. Skip individual message processing unless drain reports new HELP messages.\n- **process-cleanups**: Skip entirely (say \"Abbreviated: skipping cleanups\").\n- **check-refinery**: Quick `gt session status` checks only. Skip queue health analysis and deacon health.\n- **survey-workers**: Run `gt patrol scan --notify` only. Skip orphaned bead detection.\n- **check-timer-gates**: Skip entirely.\n- **check-swarm-completion**: Skip entirely.\n- **patrol-cleanup**: Skip entirely.\n- **context-check**: Quick self-assessment only (one sentence).\n- **loop-or-exit**: Normal (await-signal as usual).\n\nWhen `await-signal` outputs `EFFORT: full`, run all steps thoroughly (normal mode).\n\nThe goal: idle cycles should burn ~10% of the tokens a full patrol uses."
formula = 'mol-witness-patrol'
version = 13

[vars]
[vars.wisp_type]
description = "Type of wisp created for this molecule"
default = "patrol"

[vars.idle_effort_threshold]
description = "Idle cycles before switching to abbreviated patrol (0 = always full)"
default = "1"

[vars.rig]
description = "Name of the rig this witness belongs to (e.g., gastown, laser)"
default = "UNSET_RIG"

[vars.prefix]
description = "Beads prefix for this rig (e.g., gt for gastown, la for laser)"
default = "gt"

[[steps]]
description = "First, clean up YOUR OWN wisps from previous cycles (closed wisps + abandoned wisps):\n```bash\nbd mol wisp gc --closed --force\nbd mol wisp gc --age 1h --force\n```\n\n🚨 **SWIM LANE RULE: Do NOT close wisps you didn't create.**\nWisp lifecycle management (close, delete, gc) for non-witness wisps is the\nreaper Dog's responsibility, NOT yours. If you see wisps that look orphaned\nor stale but were NOT created by your patrol, **report them — don't close them**:\n```bash\ngt mail send deacon/ -s \"NOTICE: Possibly orphaned wisps\" -m \"Found wisps that may be orphaned:\n<list wisp IDs>\nThese were NOT created by witness patrol. Reporting for reaper review.\"\n```\nClosing foreign wisps kills active polecat work molecules.\n\n## Step 0: Drain stale protocol messages (ALWAYS run first)\n\nBefore processing individual messages, bulk-drain stale protocol messages.\nThis prevents inbox backlog from consuming patrol context.\n\n```bash\ngt mail drain --identity <rig>/witness --max-age 30m\n```\n\nThis archives POLECAT_DONE, POLECAT_STARTED, LIFECYCLE:*, MERGED,\nMERGE_READY, MERGE_FAILED, and SWARM_START messages older than 30 minutes.\nHELP and HANDOFF messages are NEVER drained (they need attention).\n\nIf the drain reports > 0 archived messages, log the count and continue.\n\n## Step 1: Check inbox size and batch if needed\n\n```bash\ngt mail inbox\n```\n\n**Batch processing rule**: If inbox has > 10 messages after drain:\n- Process messages in batches by type, not one-by-one\n- Group POLECAT_DONE messages together: archive all at once\n- Group MERGED messages: close cleanup wisps, then archive batch\n- Process HELP messages individually (they need assessment)\n- Log summary counts: \"Processed 5 POLECAT_DONE, 3 MERGED, 1 HELP\"\n\n**If inbox ≤ 10 messages**: Process each individually as described below.\n\nFor each message:\n\n**POLECAT_STARTED**:\nA new polecat has started working. Acknowledge and archive.\n```bash\n# Acknowledge startup (optional: log for activity tracking)\ngt mail archive <message-id>\n```\nNo action needed beyond acknowledgment - archive immediately.\n\n**POLECAT_DONE / LIFECYCLE:Shutdown** (FALLBACK — primary discovery is via survey-workers bead scan, gt-w0br):\n\n*PERSISTENT MODEL (gt-4ac)*: Polecats persist after work completion.\nThe polecat transitions to idle state — its sandbox is preserved for reuse.\nThe MR lifecycle continues independently in the Refinery.\n\nPolecat lifecycle: spawning → working → mr_submitted → idle (preserved)\nMR lifecycle: created → queued → processed → merged (handled by Refinery)\n\n⚠️ **CRITICAL (gt-6a9d): Do NOT nuke polecats with pending MRs.**\nThe refinery needs the remote branch to merge. Nuking deletes the branch\nand orphans the MR, causing work loss.\n\nThe handler (HandlePolecatDone) will:\n1. If pending MR exists: Create cleanup wisp, send MERGE_READY to refinery\n2. If no MR: Acknowledge completion (polecat is idle)\n\n```bash\n# The handler does this automatically:\n# - With MR: create cleanup wisp + send MERGE_READY → archive mail\n# - Without MR: acknowledge → archive mail\n# - Polecat goes idle in BOTH cases — no nuke.\n```\n\nDo NOT run gt polecat nuke on POLECAT_DONE (or any automatic trigger). The polecat is idle, not dead.\nArchive the message after the handler processes it.\n\n**MERGED**:\nA branch was merged successfully. The polecat's cleanup wisp can be closed.\nThe polecat remains idle (sandbox preserved for reuse).\n\nIf a cleanup wisp exists, close it:\n```bash\n# Find the cleanup wisp for this polecat\nbd list --label polecat:<name>,state:merge-requested --status=open\n\n# If found, close the wisp (work is merged, cleanup tracked)\nbd close <wisp-id> --reason \"merged successfully\"\n```\nDo NOT nuke the polecat. Archive after cleanup wisp is closed.\n\n**HELP / Blocked**:\nThe handler (HandleHelp) automatically classifies the request by category and\nseverity using keyword matching. The assessment appears in the handler output.\n\n**Assessment categories and routing:**\n| Category | Severity | Route to | Trigger keywords |\n|----------|----------|----------|------------------|\n| emergency | critical | overseer | security, vulnerability, breach, data corruption, data loss |\n| failed | high | deacon | crash, panic, fatal, oom, disk full, connection refused, database error |\n| blocked | high | mayor | blocked, merge conflict, deadlock, stuck, cannot proceed |\n| decision | medium | deacon | which approach, ambiguous, unclear, design choice, architecture |\n| lifecycle | medium | witness | session, respawn, zombie, hung, timeout, no progress |\n| help | medium | deacon | (default when no keywords match) |\n\nUse the assessment as guidance, but apply your own judgment:\n1. **Can you resolve it directly?** (e.g., lifecycle issues, simple guidance) → Help and archive\n2. **Need to escalate?** → Route to the suggested target:\n```bash\ngt mail send <suggested-target>/ -s \"Escalation: <polecat> needs help\" -m \"Category: <category>\nSeverity: <severity>\n<original details>\"\n```\n3. **Override assessment if needed** — the heuristic is a starting point, not gospel.\n\nArchive after handling (escalated or resolved):\n```bash\ngt mail archive <message-id>\n```\n\n**HANDOFF**:\nRead predecessor context. Continue from where they left off.\nArchive after absorbing context:\n```bash\ngt mail archive <message-id>\n```\n\n**SWARM_START**:\nMayor initiating batch polecat work. Initialize swarm tracking.\n```bash\n# Parse swarm info from mail body: {\"swarm_id\": \"batch-123\", \"beads\": [\"bd-a\", \"bd-b\"]}\nbd create --ephemeral --wisp-type patrol --title \"swarm:<swarm_id>\" --description \"Tracking batch: <swarm_id>\" --labels swarm,swarm_id:<swarm_id>,total:<N>,completed:0,start:<timestamp>\n```\nArchive after creating swarm tracking wisp:\n```bash\ngt mail archive <message-id>\n```\n\n**Hygiene principle**: Archive messages after they're fully processed.\nKeep only: active work, unprocessed requests. Inbox should be near-empty."
id = 'inbox-check'
title = 'Process witness mail'

[[steps]]
description = "Process cleanup wisps (merge tracking and dirty state handling).\n\nCleanup wisps are created for two reasons:\n1. Pending MR: HandlePolecatDone creates a wisp in 'merge-requested' state\n   when a polecat has work in the refinery queue. These are resolved when\n   the MERGED signal arrives.\n2. Dirty state: When a polecat has uncommitted changes or unpushed commits\n   that need manual intervention.\n\n```bash\n# Find all cleanup wisps\nbd list --label cleanup --status=open\n```\n\nIf no wisps, skip this step (most common case in ephemeral model).\n\nFor each cleanup wisp, investigate and resolve the dirty state:\n\n## State: pending (needs investigation)\n\n1. **Extract polecat name** from wisp title/labels\n\n2. **Diagnose the problem**:\n```bash\ncd polecats/<name>\ngit status                    # What's uncommitted?\ngit stash list                # Any stashed work?\ngit log @{u}..HEAD     # Any unpushed commits?\n```\n\n3. **Resolution options**:\n   - **Uncommitted changes**: Commit and push, then nuke\n   - **Stashed work**: Pop and commit, or discard if not valuable\n   - **Unpushed commits**: Push to origin, then nuke\n   - **All valuable work lost**: Escalate to Deacon for recovery\n\n4. **If resolvable locally**: Fix and nuke\n```bash\n# Example: push unpushed commits\ngit push origin HEAD\n\n# Then nuke\ngt session restart <rig>/<name>\n\n# Close the wisp\nbd close <wisp-id> --reason \"Resolved: pushed commits, nuked\"\n```\n\n5. **If needs escalation**: Send RECOVERY_NEEDED to Deacon\n```bash\ngt mail send deacon/ -s \"RECOVERY_NEEDED <rig>/<polecat>\" \\\n  -m \"Cleanup Status: <status>\nBranch: <branch>\nIssue: <issue-id>\n\nCannot auto-resolve. Please advise.\"\n```\nLeave wisp open until Deacon resolves.\n\n## State: merge-requested (legacy, rare)\n\nThis state was used before the ephemeral model. If found, the polecat is\nwaiting for a MERGED signal. The inbox-check step handles these.\n\n**Parallelism**: Use Task tool subagents to process multiple cleanups concurrently.\nEach cleanup is independent - perfect for parallel execution."
id = 'process-cleanups'
needs = ['inbox-check']
title = 'Process pending cleanup wisps'

[[steps]]
description = "Check refinery, mayor, and deacon health.\n\n**Step 1: Check refinery session**\n```bash\ngt session status <rig>/refinery\n```\n\nIf MRs waiting AND refinery not running:\n```bash\ngt session start <rig>/refinery\ngt mail send <rig>/refinery -s \"PATROL: Wake up\" -m \"Merge requests in queue. Please process.\"\ngt mol step emit-event --channel refinery --type PATROL_WAKE \\\n  --payload source=witness --payload queue_depth=<N>\n```\n\n**Event emission**: Always emit a file event when waking the refinery.\nThis ensures the refinery's `await-event` unblocks instantly instead of\nwaiting for its next timeout cycle.\n\n**Step 2: Queue health analysis**\n\nRun the full queue view to get raw data for every open MR:\n```bash\ngt refinery ready --all --json\n```\n\nThis returns all open MRs with timestamps, assignees, and branch existence data.\nUse your judgment to assess the queue — there are no hardcoded thresholds.\n\n**What to look for:**\n\n- **Stale claimed MRs**: MRs with a non-empty `Assignee` but old `UpdatedAt`.\n  Consider the queue size, time of day, and typical processing time.\n  A claimed MR that hasn't been updated in a while may indicate a stuck refinery.\n\n- **Orphaned branches**: MRs where both `BranchExistsLocal` and `BranchExistsRemote`\n  are false. The source branch may have been deleted while the MR bead is still open.\n  These likely need to be closed or investigated.\n\n- **Queue depth**: A large number of unclaimed MRs may indicate the refinery is down\n  or overwhelmed. Consider waking it or escalating.\n\n**Step 3: Check mayor health**\n\n⚠️ **The mayor may be running via Agent Client Protocol (ACP)** instead of tmux.\nUse the built-in status check which is ACP-aware:\n\n```bash\ngt mayor status --running\n```\n\nIf `false`, the mayor is dead. Escalate via `gt escalate` (severity HIGH):\n```bash\ngt escalate -s HIGH \"Mayor dead - session not found (TMUX or ACP)\"\n```\n\n**Step 4: Check deacon health (gt-p7k: heartbeat-aware dead-check)**\n\n⚠️ **The deacon tmux session is named `hq-deacon`** (NOT `deacon`).\nTown-level agents use the `hq-` prefix.\n\nUse `gt deacon status --json` to check BOTH session existence AND heartbeat freshness.\nDo NOT alert based on session absence alone — the daemon may be restarting the deacon,\nwhich causes a brief window where the session is down but the heartbeat is still fresh.\n\n```bash\ngt deacon status --json\n```\n\nInterpret the JSON output:\n- `running: true` → Deacon is alive. No action needed.\n- `running: false` AND heartbeat `fresh: true` (age < 5 min) → Deacon is likely\n  restarting (daemon killed a stuck session and is respawning). **Do NOT alert.**\n  Log the observation and move on. The daemon handles restart automatically.\n- `running: false` AND heartbeat `stale: true` or `very_stale: true` (age >= 5 min)\n  → Deacon is genuinely down. Escalate to Mayor:\n```bash\ngt mail send mayor/ -s \"ALERT: Deacon session hq-deacon is down\" \\\n  -m \"Deacon tmux session (hq-deacon) not found.\nHeartbeat age: <age_seconds>s (stale).\nDetected during witness patrol.\nPlease restart the deacon.\"\n```\n- `running: false` AND no heartbeat (heartbeat field is null) → Deacon has never\n  started or heartbeat file is missing. Escalate to Mayor.\n\nThis prevents false DEACON_DOWN alerts during brief restart windows.\n\n**Step 5: Escalate if needed**\n\nIf you identify problems, escalate to Deacon with specific MR IDs and context:\n```bash\ngt mail send deacon/ -s \"QUEUE_HEALTH: <summary>\" \\\n  -m \"MR IDs: <ids>\nObservation: <what you found>\nRecommendation: <what should happen>\"\n```"
id = 'check-refinery'
needs = ['process-cleanups']
title = 'Check refinery, mayor, and deacon health'

[[steps]]
description = "Survey all polecats for zombies, stalls, and completions.\n\n🚨 **MANDATORY: You MUST run `gt patrol scan` for zombie detection.**\nDo NOT improvise with `gt polecat list`, `gt peek`, or manual tmux checks.\nThe Go-side scan uses HasSession() liveness checks that are precise and\ncomprehensive. Ad-hoc interpretation of peek output WILL miss zombies.\n\n## Step 1: Run `gt patrol scan` (REQUIRED — not optional)\n\n```bash\ngt patrol scan --notify\n```\n\nThis single command performs ALL detection:\n- **Zombie detection**: Cross-references agent bead state with tmux sessions.\n  Dead sessions with active state → restarted. Dead agent processes → restarted.\n  Dirty state → cleanup wisp created.\n- **Stall detection**: Finds agents stuck at startup prompts and auto-dismisses.\n- **Completion discovery**: Scans agent beads for `exit_type` + `completion_time`\n  metadata written by `gt done`. Routes completions (MR → cleanup wisp + refinery\n  nudge; no MR → acknowledge idle). Clears metadata to prevent re-processing.\n\nUse `--json` for machine-readable output.\n\n## Step 2: Review scan output and handle follow-ups\n\nThe scan output tells you exactly what was found and what actions were taken.\nReview it for items needing manual follow-up:\n- Stuck polecats that need nudging\n- Escalations that need routing\n- Dirty state that needs investigation\n\n## Step 3: Nudge running polecats with no recent progress\n\nFor polecats the scan reports as alive but potentially idle, nudge them:\n```bash\ngt nudge --mode=queue <rig>/polecats/<name> \"How's progress? Need help?\"\n```\n\n## Step 4: Escalate unresolvable issues\n\nIf the scan found issues it couldn't auto-resolve:\n```bash\ngt mail send deacon/ -s \"Escalation: <polecat> stuck\" \\\n  -m \"Polecat <name> reports stuck. Please intervene.\"\n```\n\n## Step 5: Orphaned bead detection (scan from beads side)\n\n🚨 Once a polecat is nuked and its directory removed, its beads become invisible\nto zombie detection. Scan from beads to catch this:\n\n```bash\nbd list --status=in_progress --json --limit=0\nbd list --status=hooked --json --limit=0\n```\n\nFor each in_progress or hooked bead with a polecat assignee:\n1. Verify bead status is still in_progress/hooked (not closed since listing).\n   If closed, skip — the polecat completed its work. (gt-sy8)\n2. Only check beads assigned to polecats in YOUR rig\n3. Check tmux session: `gt session status <rig>/<name> --json | jq -r '.running'`\n4. Check polecat directory: `ls <rig>/polecats/<name> 2>/dev/null`\n5. If BOTH session dead AND directory missing → orphan. Reset the bead:\n   ```bash\n   bd update <bead-id> --status=open --assignee=\n   gt mail send deacon/ -s \"ORPHAN_RECOVERED: <bead-id>\" \\\n     -m \"Bead <bead-id> was assigned to <rig>/polecats/<name> which no longer exists.\n   The bead has been reset to open with no assignee.\n   Please re-dispatch to an available polecat.\"\n   ```\n6. If directory exists but session dead → skip (scan already handled it)\n7. If session alive → not an orphan, skip\n\n---\n\n**DO NOT use manual detection.** `gt patrol scan` replaces all manual\ncross-referencing of agent beads, tmux sessions, and git state. The Go code\nin internal/witness/handlers.go (DetectZombiePolecats / detectZombieDeadSession)\nis correct and comprehensive — it checks tmux session liveness, heartbeat\nfreshness, pending MRs, terminal states, and spawning grace periods.\n\nIf `gt patrol scan` fails with an error, fix the error or escalate — do NOT\nfall back to manual detection, which is unreliable."
id = 'survey-workers'
needs = ['check-refinery']
title = 'Inspect all active polecats'

[[steps]]
description = "Check for expired timer gates and escalate as needed.\n\nTimer gates are async wait conditions with a timeout. When the timeout expires,\nthe gate should be escalated to the overseer for human intervention.\n\n**Step 1: Run timer gate check**\n```bash\nbd gate check --type=timer --escalate\n```\n\nThis command:\n1. Finds all open gate issues with await_type=timer\n2. Checks if `now > created_at + timeout`\n3. Escalates expired gates via `gt escalate` (HIGH severity)\n4. Reports summary of gate status\n\n**Step 2: Review output**\n\nIf expired gates were found and escalated:\n- The escalation creates an audit trail bead\n- Overseer will be notified via mail\n- Gate remains open until manually resolved\n\nIf no expired gates:\n- Continue patrol normally\n\n**Note**: Timer gates do NOT auto-close on expiration. They escalate.\nThis ensures human oversight of timeout conditions.\n\n**Parallelism**: This is a single command, no parallel execution needed."
id = 'check-timer-gates'
needs = ['survey-workers']
title = 'Check timer gates for expiration'

[[steps]]
description = "If Mayor started a batch (SWARM_START), check if all polecats have completed.\n\n**Step 1: Find active swarm tracking wisps**\n```bash\nbd list --label swarm --status=open\n```\nIf no active swarm, skip this step.\n\n**Step 2: Count completed polecats for this swarm**\n\nExtract from wisp labels: swarm_id, total, completed, start timestamp.\nCheck how many cleanup wisps have been closed for this swarm's polecats.\n\n**Step 3: If all complete, notify Mayor**\n```bash\ngt mail send mayor/ -s \"SWARM_COMPLETE: <swarm_id>\" -m \"All <total> polecats merged.\nDuration: <minutes> minutes\nSwarm: <swarm_id>\"\n\n# Close the swarm tracking wisp\nbd close <swarm-wisp-id> --reason \"All polecats merged\"\n```\n\nNote: Runs every patrol cycle. Notification sent exactly once when all complete."
id = 'check-swarm-completion'
needs = ['check-timer-gates']
title = 'Check if active swarm is complete'

[[steps]]
description = "Verify inbox hygiene before ending patrol cycle.\n\n**Step 1: Run drain to catch any protocol messages that arrived during patrol**\n```bash\ngt mail drain --identity <rig>/witness --max-age 30m\n```\nThis catches protocol messages that accumulated while you were processing\nother patrol steps.\n\n**Step 2: Check inbox state**\n```bash\ngt mail inbox\n```\n\nIn the persistent model, POLECAT_DONE messages create cleanup wisps and\nsend MERGE_READY to refinery. Inbox should contain ONLY:\n- Unprocessed messages (just arrived, will handle next cycle)\n- MERGED notifications (close cleanup wisp, then archive)\n\n**Step 3: Archive any remaining stale messages**\n\nLook for messages that were processed but not archived:\n- HELP/Blocked that was escalated → archive\n- Any other processed messages still in inbox → archive\n\n```bash\n# For each stale message found:\ngt mail archive <message-id>\n```\n\n**Step 4: Verify cleanup wisp hygiene**\n\nIn the persistent model, cleanup wisps track pending MRs and dirty state:\n```bash\nbd list --label cleanup --status=open\n```\n\n- state:pending → Needs investigation in process-cleanups\n- state:merge-requested → Legacy state, handle in inbox-check\n\nIf cleanup wisps are accumulating, investigate why polecats aren't clean.\n\n**Goal**: Inbox should be nearly empty. Cleanup wisps should be rare."
id = 'patrol-cleanup'
needs = ['check-swarm-completion']
title = 'End-of-cycle inbox hygiene'

[[steps]]
description = "Check own context usage.\n\nIf context is HIGH (>80%):\n- Ensure any notes are written to handoff mail\n- Prepare for session restart\n\nIf context is LOW:\n- Can continue patrolling"
id = 'context-check'
needs = ['patrol-cleanup']
title = 'Check own context limit'

[[steps]]
description = """
End of patrol cycle decision.

**If context LOW** (can continue patrolling):

Resolve your agent bead ID for this patrol cycle. Verify your agent bead exists before subscribing:
```bash
YOUR_AGENT_BEAD=$(gt agents resolve --role witness --rig {{rig}})
```
This must resolve exactly one bead ID. If it fails, STOP and report the error. If it reports multiple results, STOP and report the ambiguity — manual disambiguation is required.

Then use await-signal with exponential backoff to wait for activity:

```bash
gt mol step await-signal --agent-bead "$YOUR_AGENT_BEAD" \
  --backoff-base 30s --backoff-mult 2 --backoff-max 5m
```

This command:
1. Subscribes to `bd activity --follow` (beads activity feed)
2. Returns IMMEDIATELY when any beads activity occurs
3. If no activity, times out with exponential backoff:
   - First timeout: 30s
   - Second timeout: 60s
   - Third timeout: 120s
   - ...capped at 5 minutes max
4. Tracks `idle:N` label on your agent bead for backoff state
5. Outputs `EFFORT: reduced` or `EFFORT: full` directive for next cycle

**On signal received** (activity detected):
Reset the idle counter and start next patrol cycle:
```bash
gt agents state "$YOUR_AGENT_BEAD" --set idle=0
```

**On timeout** (no activity):
The idle counter was auto-incremented. Continue to next patrol cycle
(the longer backoff will apply next time).

## Effort-Based Patrol Routing

After await-signal returns, check the EFFORT directive in the output:

**If `EFFORT: full`** — Run all steps thoroughly (normal patrol).

**If `EFFORT: reduced`** — Run ABBREVIATED patrol:
- inbox-check: `gt mail drain` only, skip individual messages unless HELP found
- process-cleanups: SKIP
- check-refinery: Quick session status checks only
- survey-workers: `gt patrol scan --notify` only, skip orphan bead detection
- check-timer-gates: SKIP
- check-swarm-completion: SKIP
- patrol-cleanup: SKIP
- context-check: One-sentence self-assessment

Abbreviated patrol should complete in ~10% of the tokens of a full patrol.
Mark skipped steps as SKIP in the patrol report.

After await-signal returns (either by signal or timeout):
1. Generate a brief summary of this patrol cycle's observations
2. Close current patrol and start next cycle:
```bash
gt patrol report --summary "<brief summary of patrol observations>"
```
This closes the current patrol wisp and automatically creates a new one.
3. Continue executing from the first step of the new patrol cycle

**If context HIGH** (approaching limit):
1. Write handoff mail with notable observations:
```bash
gt handoff -s "Witness patrol handoff" -m "<observations>"
```
2. Exit cleanly - the daemon will respawn a fresh Witness session

**NOTE (gt-058d)**: `gt handoff` enforces a minimum 2-minute cooldown between
handoffs. If the previous handoff was less than 2 minutes ago, the command
will sleep until the cooldown expires before proceeding. This prevents tight
restart loops when the rig is idle and patrols complete quickly.

**IMPORTANT**: You must either report and loop (context LOW) or exit (context HIGH).
Never leave the session idle without work on your hook.
"""
id = 'loop-or-exit'
needs = ['context-check']
title = 'Loop or exit for respawn'
